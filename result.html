<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Passed - Scorecard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0D8584; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; }
        .card { background: rgba(0,0,0,0.5); padding: 40px; border-radius: 10px; text-align: center; width: 100%; max-width: 400px; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; text-align: left;}
        th, td { padding: 10px; border-bottom: 1px solid #555; }
        h1 { margin-top: 0; color: #fff; }
        .total { font-weight: bold; font-size: 1.2rem; color: #4CAF50; }
        a.btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #fff; color: #0D8584; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Mission Complete</h1>
        <p>Your match has been recorded.</p>
        
        <table>
            <tr>
                <th>Calculation Part</th>
                <th>Value</th>
            </tr>
            <tr>
                <td>Cells Progress (Max 1000)</td>
                <td id="cell-score">0</td>
            </tr>
            <tr>
                <td>Clear Bonus</td>
                <td id="win-bonus">0</td>
            </tr>
            <tr>
                <td>Time Penalty (-2/s)</td>
                <td id="time-penalty">-0</td>
            </tr>
            <tr>
                <td class="total">Final Score</td>
                <td class="total" id="final-score">0</td>
            </tr>
        </table>
        
        <a href="/leaderboard.html" class="btn">View Leaderboard</a>
    </div>

    <script type="module" src="/src/js/result.js"></script>
</body>
</html>
