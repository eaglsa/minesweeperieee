<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Minesweeper</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"
        integrity="sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4=" crossorigin="anonymous"></script>
</head>

<body>
    <div class="flex-container">
        <div class="game-board" style="display: flex; flex-direction: column; align-items: center;">
            <div style="margin: 10px 0;">
                <button id="flag-toggle"
                    style="background-color: lightgray; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; max-width: 250px;">
                    Flag Mode: <strong>OFF</strong> <img src="images/flag.png" style="vertical-align: middle;">
                </button>
            </div>
            <table id="board"></table>
        </div>
    </div>
    <section id="footer">
        <div id="start"><img src="images/start.png"></div>
        <div id="size-btns">
            <div id="size-btns"><button id="size-9"><img src="images/easy.png"> Easy</button></div>
        </div>
        <div id="clock">
        </div>
    </section>
    <script src="js/cell.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
