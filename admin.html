<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExeCom Admin Panel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; margin: 0; color: white; display: flex; flex-direction: column; align-items: center; padding: 40px 20px;}
        h1 { margin-top: 0; color: #e74c3c; }
        .board { background: rgba(0,0,0,0.5); padding: 30px; border-radius: 10px; width: 100%; max-width: 800px; box-sizing: border-box; display: none; }
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 20px;}
        th, td { padding: 12px; border-bottom: 1px solid #555; }
        th { color: #aaa; text-transform: uppercase; font-size: 0.9em;}
        tr:nth-child(even) { background-color: rgba(255,255,255,0.05); }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        .btn-del:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div id="auth-check" style="text-align:center;">Verifying Access...</div>
    <div class="board" id="admin-panel">
        <h1>Control Panel</h1>
        <table>
            <thead>
                <tr>
                    <th>Player</th>
                    <th>Score</th>
                    <th>Cells</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="admin-body">
            </tbody>
        </table>
    </div>

    <script type="module" src="/src/js/admin.js"></script>
</body>
</html>
